<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>EnqueteHub</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">
                EnqueteHub
            </a>
            {% if session.get("user_id") %}
                <div class="nav-user">
                    <span>
                        {{ session["user_name"] }}
                    </span>
                    <a href="/logout">
                        Sair
                    </a>
                </div>
            {% endif %}
        </div>
    </nav>

    <main class="page">
        {% block content %}
        {% endblock %}
    </main>
</body>

</html>
